muon_lr: 0.005
lr: 0.0015
stateful_stream: true
lam: 0.99
max_tokens: 80000000
eval_every: 2000
ckpt_every: 1000
keep_last: 1
log_every: 20
amp: true
compile: false
compile_mode: default
compile_dynamic: true
seed: 0
