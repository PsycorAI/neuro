# ST long-context probe — 9M tier, STATEFUL. block 2048, n_layers 4, lam 0.99.
# Decisive go/no-go: does stateful beat random at long context where it should shine?
run_name: st_lc_9m_stateful
arch: spiking
vocab: 16384
d: 256
n_neurons: 512
d_mem: 256
n_layers: 4
recurrent: true
