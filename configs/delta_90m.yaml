# 90M DELTA arm — the intermediate rung between the 9M A/B win and a (multi-day) 350M.
# Arch = phase3_5090 (~92M). Matched A/B vs hebb_90m (identical except delta_rule).
# compile:false (delta's triangular solve); fpt_K=20 for delta margin. 400M-token probe.
run_name: delta_90m
arch: spiking
vocab: 16384
d: 1024
n_neurons: 2048
d_mem: 1024
n_layers: 4
recurrent: true
rec_density: 0.02
set_zeta: 0.3
set_every: 200
block_size: 512
batch_size: 32
grad_accum: 1
eval_batch: 8
use_fpt: true
fpt_K: 20
delta_rule: true
sparsity_lambda: 0.5
sparsity_target: 0.05
optimizer: muon
muon_lr: 0.005
lr: 0.0006
lam: 0.98
max_tokens: 400000000
eval_every: 2000
ckpt_every: 4000
keep_last: 2
log_every: 50
amp: true
compile: false
compile_mode: default
compile_dynamic: true
seed: 0
