# Gated DeltaNet 90M + MQAR-augmented training. Combines the literature's two
# orthogonal levers: data-dependent forget gate + explicit recall pressure.
run_name: gated_delta_90m_mqar
arch: spiking
vocab: 16384
d: 1024
n_neurons: 2048
d_mem: 1024
n_layers: 4
recurrent: true
rec_density: 0.02
set_zeta: 0.3
set_every: 200
block_size: 512
batch_size: 32
grad_accum: 1
eval_batch: 8
use_fpt: true
fpt_K: 20
delta_rule: true
decay_gate: true
mqar_aug: true
mqar_N_min: 4
mqar_N_max: 32
mqar_weight: 0.5
sparsity_lambda: 0.5
sparsity_target: 0.05
optimizer: muon
muon_lr: 0.005
lr: 0.0006
lam: 0.98
max_tokens: 400000000
eval_every: 2000
ckpt_every: 4000
keep_last: 2
log_every: 50
amp: true
compile: false
compile_mode: default
compile_dynamic: true
seed: 0
