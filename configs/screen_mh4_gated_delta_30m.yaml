# Screening tier: multi-head H=4 (d_head=256) on gated-delta. Tests whether
# per-head k/v subspaces reduce collisions and improve recall.
run_name: screen_mh4_gated_delta_30m
arch: spiking
vocab: 16384
d: 1024
n_neurons: 1024
d_mem: 1024
n_heads: 4
n_layers: 2
recurrent: true
rec_density: 0.02
set_zeta: 0.3
set_every: 200
block_size: 512
batch_size: 32
grad_accum: 1
eval_batch: 8
use_fpt: true
fpt_K: 20
delta_rule: true
decay_gate: true
sparsity_lambda: 0.5
sparsity_target: 0.05
optimizer: muon
muon_lr: 0.005
lr: 0.0006
lam: 0.98
max_tokens: 100000000
eval_every: 1000
ckpt_every: 2000
keep_last: 1
log_every: 50
amp: true
compile: false
compile_mode: default
compile_dynamic: true
seed: 0
