# 760M Gated DeltaNet + MQAR-aug (MDS recipe at 2x scale of 350M).
# Arch scaled from phase3_350M: d/n_neurons/d_mem all +1.5x, L same.
# VRAM: M state ~38MB * batch * 5 layers = batch 8 -> ~1.5 GB just for M.
# batch=8 keeps things safe on 5090 (32 GB).
#
# COMPILE NOTE: compile=false default is safe. The delta_chunked_gated kernel uses
# torch.linalg.solve_triangular which CAN graph-break or fail under torch.compile.
# To try: set compile=true and watch the first few steps for NaN / dynamo errors.
# Likely 1.5-3x speedup if it works.
run_name: gated_delta_750m_mqar
arch: spiking
vocab: 16384
d: 3072
n_neurons: 6144
d_mem: 3072
n_layers: 5
recurrent: true
rec_density: 0.02
set_zeta: 0.3
set_every: 200
block_size: 256
batch_size: 8
grad_accum: 4
eval_batch: 4
use_fpt: true
fpt_K: 20
delta_rule: true
decay_gate: true
mqar_aug: true
mqar_N_min: 4
mqar_N_max: 32
mqar_weight: 0.5
sparsity_lambda: 0.5
sparsity_target: 0.05
optimizer: muon
muon_lr: 0.005
lr: 0.0004
lam: 0.98
max_tokens: 1500000000
eval_every: 4000
ckpt_every: 4000
keep_last: 2
log_every: 50
amp: true
compile: false
compile_mode: default
compile_dynamic: true
seed: 0
