# SFT on the 30M MDS screening winner (fast iteration).
# 30M is small but lets us validate the SFT pipeline cheaply (~1h vs ~6h at 350M).
# Same arch as screen_gated_delta_30m_mqar; resumes from its weights.
run_name: sft_30m_mds
sft_init: screen_gated_delta_30m_mqar
sft_dataset: yahma/alpaca-cleaned
sft_split: train
sft_max_len: 512

arch: spiking
vocab: 16384
d: 1024
n_neurons: 1024
d_mem: 1024
n_layers: 2
recurrent: true
rec_density: 0.02
set_zeta: 0.3
set_every: 200
block_size: 512
batch_size: 8
grad_accum: 4
use_fpt: true
fpt_K: 20
delta_rule: true
decay_gate: true
sparsity_lambda: 0.0      # disable sparsity penalty during SFT
sparsity_target: 0.05
optimizer: muon
muon_lr: 0.001            # 5x LOWER than pretraining — SFT is gentle refinement
lr: 0.0001
lr_min_frac: 0.1
lr_warmup_frac: 0.05
lam: 0.98
max_tokens: 200000000     # ~1 pass over alpaca (52k × ~500 tok)
eval_every: 10000
ckpt_every: 2000
keep_last: 2
log_every: 100
amp: true
compile: false
seed: 0
