# Hebbian 350M control — matched A/B vs gated_delta_350m. Same arch/budget/fpt_K/
# compile so recall_eval(gated_delta_350m, hebb_350m) isolates the write rule.
# Distinct from phase3_350M (which used compile=true, fpt_K=10, no kd) so this is
# the clean comparator.
run_name: hebb_350m
arch: spiking
vocab: 16384
d: 2048
n_neurons: 4096
d_mem: 2048
n_layers: 5
recurrent: true
rec_density: 0.02
set_zeta: 0.3
set_every: 200
block_size: 512
batch_size: 16
grad_accum: 1
eval_batch: 8
use_fpt: true
fpt_K: 20
delta_rule: false
sparsity_lambda: 0.5
sparsity_target: 0.05
optimizer: muon
muon_lr: 0.005
lr: 0.0004
lam: 0.98
max_tokens: 2000000000
eval_every: 4000
ckpt_every: 4000
keep_last: 2
log_every: 50
amp: true
compile: false
compile_mode: default
compile_dynamic: true
seed: 0
