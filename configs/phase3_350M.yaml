# ~360M multi-layer spiking-Hebbian. Phase 3 target scale.
# Chinchilla-optimal: ~7B tokens.
# Est. throughput at FPT+TFLA: ~25-35k tok/s on 5090 → ~2-2.5 days for 7B tokens.
run_name: phase3_350M
arch: spiking
vocab: 16384
d: 2048
n_neurons: 4096
d_mem: 2048
n_layers: 5
recurrent: true
rec_density: 0.02
set_zeta: 0.3
set_every: 200
block_size: 512
batch_size: 32
grad_accum: 2
eval_batch: 8
use_fpt: true
fpt_K: 10
sparsity_lambda: 0.5
sparsity_target: 0.05
optimizer: muon
muon_lr: 0.005
lr: 0.0004
max_tokens: 7000000000  # 7B (Chinchilla-optimal for 360M)
eval_every: 5000
ckpt_every: 5000
keep_last: 3
log_every: 5000
amp: true
compile: true
compile_mode: default
compile_dynamic: true
seed: 0
