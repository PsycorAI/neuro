# Batch A follow-up: re-test embed_scale now that embedding init is paired.
# Identical to screen_batchA_30m EXCEPT embed_scale: true.
# The model.py fix initializes self.embed.weight with std=1/sqrt(d) whenever
# embed_scale=True, so the embed * sqrt(d) product lands at O(1).
#
# Compare to screen_batchA_30m (RMSNorm + Z-loss + deeper MTP, no embed_scale).
# Pass criteria: stable training (no NaN, no loss spikes), val_ppl within 5% of
# the no-embed-scale Batch A. Promote if better.
run_name: screen_batchA_embedscale_30m
arch: spiking
vocab: 16384
d: 1024
n_neurons: 1024
d_mem: 1024
n_layers: 2
recurrent: true
rec_density: 0.02
set_zeta: 0.3
set_every: 200
block_size: 512
batch_size: 16
grad_accum: 2
eval_batch: 8
use_fpt: true
fpt_K: 20
delta_rule: true
decay_gate: true
mqar_aug: true
mqar_N_min: 4
mqar_N_max: 32
mqar_weight: 0.5
sparsity_lambda: 0.5
sparsity_target: 0.05

# --- MTP + Batch A features ---
mtp_enabled: true
mtp_offset: 2
mtp_weight: 0.3
mtp_depth: 2
use_rmsnorm: true
embed_scale: true       # NOW SAFE: paired with std=1/sqrt(d) embed init
z_loss_weight: 0.0001

optimizer: muon
muon_lr: 0.005
lr: 0.0006
lam: 0.98
max_tokens: 100000000
eval_every: 1000
ckpt_every: 1000
keep_last: 1
log_every: 200
amp: true
compile: false
compile_mode: default
compile_dynamic: true
seed: 0
