# Hybrid 90M arm — Gated DeltaNet + BASED-style sliding-window local attention.
# Global memory (delta+forget) handles long-range; tiny exact-attention window
# (W=64) handles fresh local bindings, the bottleneck of pure-recurrent recall.
# Gate inits at 0 (tanh(0)=0 -> local branch starts as no-op; model can ramp it up).
# Same arch/tokens as the other 90M arms so recall_eval is clean.
run_name: hybrid_90m
arch: spiking
vocab: 16384
d: 1024
n_neurons: 2048
d_mem: 1024
n_layers: 4
recurrent: true
rec_density: 0.02
set_zeta: 0.3
set_every: 200
block_size: 512
batch_size: 16
grad_accum: 2
eval_batch: 8
use_fpt: true
fpt_K: 20
delta_rule: true
decay_gate: true
local_attn: true
local_window: 64
sparsity_lambda: 0.5
sparsity_target: 0.05
optimizer: muon
muon_lr: 0.005
lr: 0.0006
lam: 0.98
max_tokens: 400000000
eval_every: 2000
ckpt_every: 4000
keep_last: 2
log_every: 50
amp: true
compile: false
compile_mode: default
compile_dynamic: true
seed: 0
