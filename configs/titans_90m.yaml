# Titans 90M arm — gradient-descent memory with momentum + data-dependent forget.
#   e = M k̂ − v ; S ← η S − θ e k̂ᵀ ; M ← (1−α) M + S ; r = M q
# (Behrouz et al. 2025). Sequential step_titans path only (no chunked kernel yet),
# so use_fpt=false. Smaller batch_size since sequential is launch-bound; the carried
# momentum matrix S also ~doubles memory state.
run_name: titans_90m
arch: spiking
vocab: 16384
d: 1024
n_neurons: 2048
d_mem: 1024
n_layers: 4
recurrent: true
rec_density: 0.02
set_zeta: 0.3
set_every: 200
block_size: 512
batch_size: 16
grad_accum: 2
eval_batch: 8
use_fpt: false
titans: true
sparsity_lambda: 0.5
sparsity_target: 0.05
optimizer: muon
muon_lr: 0.005
lr: 0.0006
lam: 0.98
max_tokens: 400000000
eval_every: 2000
ckpt_every: 4000
keep_last: 2
log_every: 50
amp: true
compile: false
compile_mode: default
compile_dynamic: true
seed: 0
