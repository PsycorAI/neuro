# 90M Hebbian control — matched A/B vs delta_90m (identical except delta_rule).
# Same arch / tokens / fpt_K / compile so recall_eval(delta_90m, hebb_90m) isolates
# the write rule. The 90M analogue of the 9M delta-vs-Hebbian A/B.
run_name: hebb_90m
arch: spiking
vocab: 16384
d: 1024
n_neurons: 2048
d_mem: 1024
n_layers: 4
recurrent: true
rec_density: 0.02
set_zeta: 0.3
set_every: 200
block_size: 512
batch_size: 32
grad_accum: 1
eval_batch: 8
use_fpt: true
fpt_K: 20
delta_rule: false
sparsity_lambda: 0.5
sparsity_target: 0.05
optimizer: muon
muon_lr: 0.005
lr: 0.0006
lam: 0.98
max_tokens: 400000000
eval_every: 2000
ckpt_every: 4000
keep_last: 2
log_every: 50
amp: true
compile: false
compile_mode: default
compile_dynamic: true
seed: 0
