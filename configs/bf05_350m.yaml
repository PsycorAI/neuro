# 350M β-floor variant — based on the 90M leaderboard under split-replay where
# delta_90m_bf05 tied or beat Hebbian at N=4 and N=32. If the ranking scales,
# this is our best candidate for the 350M flagship recall target.
# Matches phase3_350M arch exactly; only difference is delta_rule + beta_floor.
run_name: bf05_350m
arch: spiking
vocab: 16384
d: 2048
n_neurons: 4096
d_mem: 2048
n_layers: 5
recurrent: true
rec_density: 0.02
set_zeta: 0.3
set_every: 200
block_size: 512
batch_size: 16
grad_accum: 1
eval_batch: 8
use_fpt: true
fpt_K: 20
delta_rule: true
beta_floor: 0.5
sparsity_lambda: 0.5
sparsity_target: 0.05
optimizer: muon
muon_lr: 0.005
lr: 0.0004
lam: 0.98
max_tokens: 2000000000
eval_every: 4000
ckpt_every: 4000
keep_last: 2
log_every: 50
amp: true
compile: false
compile_mode: default
compile_dynamic: true
seed: 0
