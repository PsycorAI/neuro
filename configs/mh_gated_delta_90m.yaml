# Multi-head Gated DeltaNet 90M — split d_mem=1024 into 8 heads of 128.
# Each head has its own independent k/v subspace -> fewer collisions per slot
# (standard in RWKV/Mamba). Total state per layer drops from 1024^2=1M to
# 8*128^2=131k params -- 8x less but with diversity.
# Heads are collapsed into batch dim before the kernel; the existing
# delta_chunked_gated kernel processes them in parallel.
run_name: mh_gated_delta_90m
arch: spiking
vocab: 16384
d: 1024
n_neurons: 2048
d_mem: 1024
n_heads: 8
n_layers: 4
recurrent: true
rec_density: 0.02
set_zeta: 0.3
set_every: 200
block_size: 512
batch_size: 32
grad_accum: 1
eval_batch: 8
use_fpt: true
fpt_K: 20
delta_rule: true
decay_gate: true
sparsity_lambda: 0.5
sparsity_target: 0.05
optimizer: muon
muon_lr: 0.005
lr: 0.0006
lam: 0.98
max_tokens: 400000000
eval_every: 2000
ckpt_every: 4000
keep_last: 2
log_every: 50
amp: true
compile: false
compile_mode: default
compile_dynamic: true
seed: 0
